spring.datasource.url=jdbc:postgresql://localhost:5433/nutrisight
spring.datasource.username=nutrisight
spring.datasource.driverClassName=org.postgresql.Driver
spring.datasource.password=nutrisight_dev_password

# Flyway owns the schema now -- Hibernate just validates it matches.
# (ddl-auto=create-drop was wiping the embeddings on every restart, which
# defeats the point of storing them.)
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

spring.h2.console.enabled=false

# Base URL of the nutrisight-ml FastAPI service (embedding generation)
nutrisight.ml.base-url=http://localhost:8001

server.port=8080

logging.level.org.springframework.web=DEBUG
logging.level.com.dataexplorer.nutritionapi=DEBUG
spring.flyway.url=jdbc:postgresql://localhost:5433/nutrisight
spring.flyway.user=nutrisight
spring.flyway.password=nutrisight_dev_password
